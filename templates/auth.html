<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #13151c; color: #e2e8f0; min-height: 100vh; }
        .panel { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(8px); }
        i[class^="fa"], i[class*=" fa-"] { display: inline-flex; align-items: center; justify-content: center; width: 1em; line-height: 1; flex-shrink: 0; }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6" data-mode="{{ mode }}">
    <div class="panel w-full max-w-md rounded-[2rem] p-6 sm:p-8 shadow-2xl">
        <div class="mb-8">
            <a href="/" class="text-sm text-slate-500 hover:text-cyan-400 transition-colors flex items-center gap-2"><i class="fas fa-chevron-left text-[10px]"></i> На главную страницу</a>
            <h1 class="text-3xl font-extrabold mt-4">{{ 'Вход' if mode == 'login' else 'Регистрация' }}</h1>
            <p class="text-slate-500 mt-2">{{ 'Войдите, чтобы привязать сканы к аккаунту.' if mode == 'login' else 'Создайте аккаунт для сохранения истории анализов.' }}</p>
        </div>

        <div class="flex gap-2 mb-6">
            <a href="/auth?mode=login" class="flex-1 text-center py-3 rounded-xl font-semibold {% if mode == 'login' %}bg-cyan-500 text-black{% else %}bg-white/5 text-slate-300{% endif %}">Вход</a>
            <a href="/auth?mode=register" class="flex-1 text-center py-3 rounded-xl font-semibold {% if mode == 'register' %}bg-cyan-500 text-black{% else %}bg-white/5 text-slate-300{% endif %}">Регистрация</a>
        </div>

        <form id="auth-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Логин</label>
                <input name="username" type="text" class="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:border-cyan-500" placeholder="username" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Пароль</label>
                <input name="password" type="password" class="w-full bg-black/30 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:border-cyan-500" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 rounded-2xl transition-all">
                {{ 'Войти' if mode == 'login' else 'Создать аккаунт' }}
            </button>
        </form>

        <p id="msg" class="text-sm text-red-400 mt-4 hidden"></p>
    </div>

    <script>
        // Получаем режим из data-атрибута body
        const mode = document.body.dataset.mode;
        const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
        
        const form = document.getElementById('auth-form');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            msg.classList.add('hidden');
            const formData = new FormData(form);
            const response = await fetch(endpoint, { method: 'POST', body: formData });
            const result = await response.json().catch(() => ({}));
            if (!response.ok) {
                msg.textContent = result.detail || result.error || 'Ошибка';
                msg.classList.remove('hidden');
                return;
            }
            window.location.href = '/';
        });
    </script>
</body>
</html>
